name: Publish to npm

# Publishes to npm whenever you create a GitHub Release.
# Requires a repo secret NPM_TOKEN (a granular/automation npm token with publish + bypass-2FA).
on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write # for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Idempotent: skip publishing a version that's already on npm (e.g. published
      # manually), so cutting a GitHub Release never fails on a re-publish.
      - name: Publish if the version is new
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "pragmasearch@$VER" version >/dev/null 2>&1; then
            echo "pragmasearch@$VER is already published — skipping."
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
